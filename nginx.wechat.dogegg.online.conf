# 放到 Nginx 的 http 上下文内加载，例如：
#   /etc/nginx/conf.d/wechat.dogegg.online.conf
# 或 Debian/Ubuntu 的：
#   /etc/nginx/sites-available/wechat.dogegg.online.conf
#
# 面板容器应保持只监听本机：
#   127.0.0.1:36080 -> 8080
#
# 面板环境变量至少需要：
#   PANEL_ALLOWED_HOSTS=wechat.dogegg.online
#   PANEL_TRUSTED_PROXIES=172.18.0.1
#
# 如果 Nginx 与面板不经过 Docker bridge，而是直接从宿主 localhost 转发，
# 则把 PANEL_TRUSTED_PROXIES 改为 127.0.0.1。

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream woc_panel {
    server 127.0.0.1:36080;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name wechat.dogegg.online;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name wechat.dogegg.online;

    ssl_certificate     /etc/letsencrypt/live/wechat.dogegg.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wechat.dogegg.online/privkey.pem;

    client_max_body_size 600m;
    client_body_timeout 300s;

    proxy_http_version 1.1;
    proxy_buffering off;
    proxy_request_buffering off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;

    location / {
        proxy_pass http://woc_panel;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto https;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
