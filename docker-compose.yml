# WechatOnCloud —— 面板为唯一服务；微信实例由面板按需动态创建（docker run）。
# 面板挂载 docker.sock 来创建/启动/删除微信实例容器，并反向代理到它们的 KasmVNC。
# 镜像全部从 GHCR 拉取，无需本地构建。要改配置：复制 .env.example 为 .env 后修改。
services:
  panel:
    build: .
    # 镜像源前缀默认 GHCR；大陆网络拉不动时改 .env 的 WOC_IMAGE_PREFIX 切到国内反代（见 .env.example）。
    image: ${WOC_IMAGE_PREFIX}/woc-panel:${WOC_VERSION:-latest}
    container_name: woc-panel
    # pull_policy 用默认（missing）：本地已有同名镜像就直接用，没有才去 GHCR 拉。
    # 这样「发布前本地自构建」与「线上拉取」都能用同一份 compose。
    # 想强制更新到 GHCR 最新版：docker compose pull && docker compose up -d

    environment:
      - PORT=8080
      # 新建微信实例时使用的镜像（多架构，amd64/arm64 自动匹配）；前缀同样跟随 WOC_IMAGE_PREFIX。
      - WOC_WECHAT_IMAGE=${WOC_IMAGE_PREFIX:-ghcr.io/dogeggo}/wechat-on-cloud:${WOC_VERSION:-latest}
      # 透传给每个微信实例容器（KasmVNC 基础镜像用它们降权运行）
      - PUID=${WOC_PUID:-1000}
      - PGID=${WOC_PGID:-1000}
      - TZ=${WOC_TZ:-Asia/Shanghai}
      # 摄像头直通：逗号分隔的宿主视频设备（如 /dev/video0）。留空则自动探测（见下方 /host-dev 挂载）或禁用摄像头。
      # 启用前需在宿主加载 v4l2loopback 内核模块。详见 .env.example。
      - WOC_VIDEO_DEVICES=${WOC_VIDEO_DEVICES:-}
      # 实例资源相关（见 .env.example）：GPU 硬件编码默认关闭（避免 WSL2/虚拟 GPU 下 Xvnc 内存暴涨）；
      # 可选给每个实例设内存上限（GiB），0=不限制；watchdog 双阈值（soft 柔和自愈 / hard 强制重启）+ 巡检间隔。
      - WOC_ENABLE_GPU=${WOC_ENABLE_GPU:-}
      - WOC_INSTANCE_MEM_GB=${WOC_INSTANCE_MEM_GB:-}
      - WOC_INSTANCE_MEM_SOFT_MB=${WOC_INSTANCE_MEM_SOFT_MB:-1500}
      - WOC_INSTANCE_MEM_HARD_MB=${WOC_INSTANCE_MEM_HARD_MB:-2500}
      - WOC_WATCHDOG_INTERVAL_SEC=${WOC_WATCHDOG_INTERVAL_SEC:-300}
      # 设备伪装：os-release 伪装成 deepin（默认开，=0 关恢复 Debian）。详见 .env.example / doc/设备伪装.md。
      - WOC_SPOOF_OS=${WOC_SPOOF_OS:-1}
      # DNS-rebinding 防护：套 HTTPS 反代部署时把对外域名加进 .env（详见 .env.example）。
      # 默认仅放行 loopback + RFC1918 私网，直连 NAS / 局域网无需改动。
      - PANEL_ALLOWED_HOSTS=${PANEL_ALLOWED_HOSTS:-}
      # 只有这些固定来源的反代 IP/CIDR 才允许提供 X-Forwarded-Host / X-Forwarded-For。
      - PANEL_TRUSTED_PROXIES=${PANEL_TRUSTED_PROXIES:-172.18.0.1}
      # 公网部署下限制大请求体，避免未预期的大文件拖垮面板。
      - PANEL_MAX_TRANSFER_UPLOAD_MB=${PANEL_MAX_TRANSFER_UPLOAD_MB:-128}
      - PANEL_MAX_VOLUME_FILE_UPLOAD_MB=${PANEL_MAX_VOLUME_FILE_UPLOAD_MB:-256}
      - PANEL_MAX_VOLUME_ARCHIVE_UPLOAD_MB=${PANEL_MAX_VOLUME_ARCHIVE_UPLOAD_MB:-512}
      - PANEL_MAX_VOLUME_ARCHIVE_EXTRACTED_MB=${PANEL_MAX_VOLUME_ARCHIVE_EXTRACTED_MB:-1024}
      - PANEL_RATE_LIMIT_API_PER_MIN=${PANEL_RATE_LIMIT_API_PER_MIN:-600}
      - PANEL_RATE_LIMIT_AUTH_PER_MIN=${PANEL_RATE_LIMIT_AUTH_PER_MIN:-30}
      # 面板通过容器名反代到动态创建的微信实例；必须使用用户自定义网络，
      # 不能用 Docker 默认 bridge，否则容器名 DNS 不可用。
      - WOC_DOCKER_NETWORK=${WOC_DOCKER_NETWORK:-woc_internal}

    volumes:
      # 面板数据（实例元信息）与 OIDC 配置文件（auth.json）
      - /mnt/wechat/data-panel:/data
      # 面板经 docker 引擎创建/启动/删除微信实例容器、exec 触发下载、读取进度。
      # 注意：docker.sock 等同宿主 root 权限；仅允许 auth.json 白名单邮箱登录，docker API 绝不暴露给前端。
      - /var/run/docker.sock:/var/run/docker.sock
      # 摄像头自动探测（可选）：把宿主 /dev 只读挂进来，面板据此发现 /dev/videoN 并映射给实例。
      # 不想自动探测就删掉此行，改用上面的 WOC_VIDEO_DEVICES 显式指定。
      # - /dev:/host-dev:ro

    ports:
      - "127.0.0.1:${WOC_HTTP_PORT}:8080" # 面板只监听本机；公网访问必须经 HTTPS 反代

    restart: always
    networks:
      - ${WOC_DOCKER_NETWORK:-woc_internal}

#networks:
#  woc_internal:
#    name: ${WOC_DOCKER_NETWORK:-woc_internal}
#    driver: bridge

networks:
  immich_default:
    external: true
