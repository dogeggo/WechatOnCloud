# WechatOnCloud —— 面板为唯一服务；应用实例由面板按需动态创建（docker run）。
# 面板挂载 docker.sock 来创建/启动/删除应用实例容器，并反向代理到它们的 KasmVNC。
# 镜像默认从 Docker Hub 拉取，无需本地构建。要改配置：复制 .env.example 为 .env 后修改。
services:
  panel:
    build: ./panel
    # 镜像源前缀默认 Docker Hub；拉不动时改 .env 的 WOC_IMAGE_PREFIX 切到备用源或国内反代（见 .env.example）。
    image: ${WOC_IMAGE_PREFIX:-docker.io/dogeggo}/aoc-panel:${WOC_VERSION:-latest}
    container_name: aoc-panel
    environment:
      - PORT=8080
      # 新建应用实例时使用的镜像（多架构，amd64/arm64 自动匹配）；前缀同样跟随 WOC_IMAGE_PREFIX。
      - WOC_INSTANCE_IMAGE=${WOC_IMAGE_PREFIX:-docker.io/dogeggo}/app-on-cloud:${WOC_VERSION:-latest}
      # 透传给每个应用实例容器（KasmVNC 基础镜像用它们降权运行）
      - PUID=${WOC_PUID:-1000}
      - PGID=${WOC_PGID:-1000}
      - TZ=${WOC_TZ:-Asia/Shanghai}
      # 实例资源相关（见 .env.example）：强制软件渲染；可选给每个实例设内存上限（GiB），0=不限制；
      # watchdog 双阈值（soft 柔和自愈 / hard 强制重启）+ 巡检间隔。
      - WOC_INSTANCE_MEM_GB=${WOC_INSTANCE_MEM_GB:-}
      - WOC_INSTANCE_MEM_SOFT_MB=${WOC_INSTANCE_MEM_SOFT_MB:-1500}
      - WOC_INSTANCE_MEM_HARD_MB=${WOC_INSTANCE_MEM_HARD_MB:-2500}
      - WOC_WATCHDOG_INTERVAL_SEC=${WOC_WATCHDOG_INTERVAL_SEC:-300}
      - WOC_SPOOF_OS=${WOC_SPOOF_OS:-1}
      # 设备伪装：os-release 伪装成 deepin（默认开，=0 关恢复 Debian）。详见 .env.example / doc/设备伪装.md。
      # DNS-rebinding 防护：套 HTTPS 反代部署时把对外域名加进 .env（详见 .env.example）。
      # 浏览器访问强制 HTTPS；应用实例容器到面板的内网通知回传仍走 HTTP。
      - PANEL_ALLOWED_HOSTS=${PANEL_ALLOWED_HOSTS:-}
      # 只有这些固定来源的反代 IP/CIDR 才允许提供 X-Forwarded-Host / X-Forwarded-For。
      - PANEL_TRUSTED_PROXIES=${PANEL_TRUSTED_PROXIES:-172.18.0.1}
      # 公网部署下限制大请求体，避免未预期的大文件拖垮面板。
      - PANEL_MAX_TRANSFER_UPLOAD_MB=${PANEL_MAX_TRANSFER_UPLOAD_MB:-128}
      - PANEL_MAX_TRANSFER_DOWNLOAD_MB=${PANEL_MAX_TRANSFER_DOWNLOAD_MB:-128}
      - PANEL_MAX_VOLUME_FILE_UPLOAD_MB=${PANEL_MAX_VOLUME_FILE_UPLOAD_MB:-256}
      - PANEL_MAX_VOLUME_FILE_DOWNLOAD_MB=${PANEL_MAX_VOLUME_FILE_DOWNLOAD_MB:-256}
      - PANEL_MAX_VOLUME_ARCHIVE_UPLOAD_MB=${PANEL_MAX_VOLUME_ARCHIVE_UPLOAD_MB:-512}
      - PANEL_MAX_VOLUME_ARCHIVE_EXTRACTED_MB=${PANEL_MAX_VOLUME_ARCHIVE_EXTRACTED_MB:-1024}
      - PANEL_RATE_LIMIT_API_PER_MIN=${PANEL_RATE_LIMIT_API_PER_MIN:-600}
      - PANEL_RATE_LIMIT_AUTH_PER_MIN=${PANEL_RATE_LIMIT_AUTH_PER_MIN:-30}
      # 应用实例容器把 DBus 桌面通知回传到面板的内网地址；默认匹配本 compose 的 panel 容器名。
      - WOC_PANEL_INTERNAL_URL=${WOC_PANEL_INTERNAL_URL:-http://aoc-panel:8080}
      # 内部回传请求连接 aoc-panel，但 Host 头用 loopback 绕过公网 Host 白名单限制；仍由实例密钥鉴权。
      - WOC_PANEL_INTERNAL_HOST=${WOC_PANEL_INTERNAL_HOST:-127.0.0.1}
      # 面板通过容器名反代到动态创建的应用实例；必须使用用户自定义网络，
      # 不能用 Docker 默认 bridge，否则容器名 DNS 不可用。
      - WOC_DOCKER_NETWORK=${WOC_DOCKER_NETWORK:-woc_internal}

    volumes:
      # 面板数据（实例元信息）与 OIDC 配置文件（auth.json）
      - /mnt/woc/data-panel:/data
      # 面板经 docker 引擎创建/启动/删除应用实例容器、exec 触发下载、读取进度。
      # 注意：docker.sock 等同宿主 root 权限；仅允许 auth.json 白名单/管理员邮箱登录，docker API 绝不暴露给前端。
      - /var/run/docker.sock:/var/run/docker.sock

    ports:
      - "127.0.0.1:${WOC_HTTP_PORT:-36080}:8080" # 面板只监听本机；公网访问必须经 HTTPS 反代

    restart: always
    networks:
      - ${WOC_DOCKER_NETWORK:-woc_internal}

networks:
  woc_internal:
    name: ${WOC_DOCKER_NETWORK:-woc_internal}
    driver: bridge
  immich_default:
    external: true
